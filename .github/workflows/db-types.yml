name: Supabase DB Types Consistency

# Supabaseのスキーマ変更と、生成済みTypeScript型の整合性をCIで検証するワークフロー
on:
  # Supabase関連ファイルや型定義ファイル、依存関係が変更されたときに実行
  push:
    paths:
      - "supabase/**"
      - "app/types/lib/database.types.ts"
      - "package.json"
      - "package-lock.json"
  # PRでも同じ条件で実行し、マージ前に型ズレを検出
  pull_request:
    paths:
      - "supabase/**"
      - "app/types/lib/database.types.ts"
      - "package.json"
      - "package-lock.json"
  # 手動実行（必要時の再検証用）
  workflow_dispatch:

jobs:
  db-types:
    name: Validate Supabase types
    runs-on: ubuntu-latest
    # fork 由来の pull_request では secrets/vars が利用できないためジョブをスキップ
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    # 事前設定が必要なパラメータ:
    # 1) SUPABASE_ACCESS_TOKEN
    #    - 設定箇所: GitHub Repository > Settings > Secrets and variables > Actions > Secrets
    # 2) SUPABASE_PROJECT_ID
    #    - 設定箇所: GitHub Repository > Settings > Secrets and variables > Actions > Variables
    # どちらか未設定の場合は、エラー終了して対応方法を表示します。
    env:
      # 型生成対象のSupabase Project ID（GitHub Variables）
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}

    steps:
      # リポジトリのソースコードをワークフロー実行環境へ取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # Supabase CLI実行に必要なNode.js実行環境を準備
      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      # package-lock.jsonに基づいて依存関係を再現性高くインストール
      - name: Install dependencies
        run: npm ci

      # 必須設定（Variable）の有無を確認し、後続ステップの実行可否を決定
      - name: Check Supabase configuration
        run: |
          # 未設定なら即時エラー終了
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::必須パラメータが未設定です。SUPABASE_PROJECT_ID（Variable）を設定してください。"
            echo ""
            echo "::error::[対応方法]"
            echo "::error::1. Supabase側で値を確認する"
            echo "::error::   - Project Settings > API で Project URL / Project API Keys を確認"
            echo "::error::   - Project ID は Project Settings > General で確認"
            echo "::error::2. GitHubリポジトリで値を設定する"
            echo "::error::   - Settings > Secrets and variables > Actions > Variables"
            echo "::error::     - SUPABASE_PROJECT_ID を登録"
            echo "::error::3. 設定後にこのワークフローを再実行する"
            exit 1
          fi

      # Supabase CLIで public スキーマから TypeScript 型を生成し、型定義ファイルへ出力
      - name: Generate Supabase database types
        env:
          # Supabase CLI認証に使用するトークン（GitHub Secrets）
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::必須パラメータが未設定です。SUPABASE_ACCESS_TOKEN（Secret）を設定してください。"
            echo ""
            echo "::error::[対応方法]"
            echo "::error::1. Supabase側で値を確認する"
            echo "::error::   - Supabase Dashboard > Account Settings > Access Tokens で Personal Access Token（PAT）を発行/確認"
            echo "::error::2. GitHubリポジトリで値を設定する"
            echo "::error::   - Settings > Secrets and variables > Actions > Secrets"
            echo "::error::     - SUPABASE_ACCESS_TOKEN を登録"
            echo "::error::3. 設定後にこのワークフローを再実行する"
            exit 1
          fi

          # 共通スクリプト経由で型生成と整形を実行（ローカル/CIの設定差分を防止）
          npm run db:types

      # 生成結果とコミット済みファイルとの差分を確認し、ズレがあればCIを失敗させる
      - name: Check for drift in generated types
        run: |
          # git diff --quiet は差分なし=0、差分あり=1 を返す
          if ! git diff --quiet app/types/lib/database.types.ts; then
            echo "::error::database.types.ts がsupabaseスキーマの型定義と一致していません。"
            echo "::error::npm run db:types を実行後、再度コミット・プッシュしてください。"
            git diff -- app/types/lib/database.types.ts
            exit 1
          fi
        shell: bash
