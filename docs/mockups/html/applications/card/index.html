<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アプリカードモック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main class="page content-shell" style="display: flex; justify-content: center; align-items: flex-start">
      <div class="app-card-showcase">
        <article class="app-card-mock" data-mockup-capture="application-card-content">
          <div class="app-card-head">
            <div>
              <h2 class="app-card-title">Flow Board</h2>
              <p class="app-card-meta">開発者: 森川 未来</p>
            </div>
            <span>⋮</span>
          </div>
          <div class="app-card-body">
            <p class="app-card-desc">
              チームのタスク状況を一画面で可視化。担当者ごとの負荷バランスを確認できる支援アプリです。
            </p>
            <div style="margin-top: 10px">
              <span class="app-detail-label">カテゴリー:</span>
              <span class="member-tag">業務効率化</span>
            </div>
            <p class="app-card-url">例URL: https://example-app.local/flow-board</p>
          </div>
          <div class="app-card-foot">
            <a class="btn-black" href="https://example-app.local/flow-board">詳細</a>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
