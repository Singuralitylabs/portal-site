<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アプリ詳細モーダルモック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main class="page" style="background: #f8fafc">
      <div
        class="container"
        data-mockup-capture="application-detail-modal-content"
        style="max-width: 980px"
      >
        <section class="app-detail-modal-shell">
          <div class="detail-row">
            <h1 class="member-modal-title">アプリ詳細</h1>
            <span class="detail-close">×</span>
          </div>

          <h2 class="app-detail-title">Flow Board</h2>

          <div class="app-detail-cover">サムネイル画像（例）</div>

          <section class="app-detail-section">
            <p class="app-detail-label">詳細説明</p>
            <p class="app-detail-text">
              チームのタスク状況を一画面で可視化する業務支援アプリです。進捗の遅れを見つけやすくし、
              担当者ごとの負荷バランスを確認できます。改行を含む長文説明も想定した表示です。
            </p>
          </section>

          <div class="app-detail-meta">
            <div>
              <span class="app-detail-label">カテゴリー:</span>
              <span class="member-tag">業務効率化</span>
            </div>
            <div>
              <span class="app-detail-label">開発者:</span>
              <strong style="font-size: 14px">森川 未来</strong>
            </div>
            <div>
              <span class="app-detail-label">例URL:</span>
              <span style="font-size: 14px">https://example-app.local/flow-board</span>
            </div>
          </div>

          <div class="app-detail-link">
            <a class="btn-black" href="https://example-app.local/flow-board">アプリを開く</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
