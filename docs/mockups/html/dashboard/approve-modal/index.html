<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 承認確認モック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main
      class="page"
      style="background: #f8fafc; display: flex; justify-content: center; align-items: flex-start"
    >
      <div data-mockup-capture="dashboard-approve-modal-content" style="padding: 10px">
        <section class="confirm-modal approve-modal-mock" style="margin: 0">
          <div class="confirm-head">
            <h1 class="confirm-title">承認確認</h1>
            <button type="button" class="confirm-close-btn" aria-label="閉じる">
              <i data-lucide="x"></i>
            </button>
          </div>
          <div class="confirm-body">
            <p class="confirm-text">山田太郎 さんを承認しますか？</p>
            <div class="confirm-actions">
              <button class="btn-outline-default">キャンセル</button>
              <button class="btn-solid-blue">承認</button>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
      if (window.lucide) {
        window.lucide.createIcons();
      }
    </script>
  </body>
</html>
