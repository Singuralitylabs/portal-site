<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>資料詳細モーダルモック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main class="page" style="background: #f1f5f9">
      <div
        class="container"
        data-mockup-capture="document-detail-modal-content"
        style="max-width: 760px"
      >
        <section class="card" style="padding: 24px">
          <div class="detail-row" style="margin-bottom: 16px">
            <h1 style="margin: 0; font-size: 32px">資料詳細</h1>
            <span style="font-size: 24px; color: #6b7280">×</span>
          </div>
          <h2 style="margin: 0 0 16px; font-size: 30px">入会手続きガイド</h2>
          <div>
            <p style="margin: 0 0 8px; color: #6b7280; font-size: 14px">詳細説明</p>
            <p style="margin: 0; color: #374151; line-height: 1.7">
              シンラボ参加時に必要な申請手続き、各種アカウント登録、利用ルールをまとめた資料です。初回ログイン後に確認し、必要な設定を順番に進めてください。改行を含む長い説明文もこの領域に全文表示されます。
            </p>
          </div>
          <div style="margin-top: 14px">
            <span style="color: #6b7280; font-size: 14px">カテゴリー:</span>
            <span class="badge">事務局資料</span>
          </div>
          <div style="margin-top: 10px; color: #6b7280; font-size: 14px">責任者: 事務局</div>
          <div style="margin-top: 18px" class="btn-black">資料を開く</div>
        </section>
      </div>
    </main>
  </body>
</html>
