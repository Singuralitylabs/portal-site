        </div>
        <div style="display: flex; justify-content: center">
          <div
            class="card"
            style="
              max-width: 640px;
              background: #eff6ff;
              border-color: #bfdbfe;
              padding: 18px;
              text-align: left;
            "
          >
            <p style="margin: 0 0 10px; font-weight: 700; font-size: 30px; color: #1e3a8a">
              ログイン時のご連絡

            <p style="margin: 0; color: #374151; font-size: 32px; line-height: 1.5">
