<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会員カードモック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main
      class="page content-shell"
      style="display: flex; justify-content: center; align-items: flex-start"
    >
      <div style="width: 360px">
        <article class="member-card-mock" data-mockup-capture="member-card-content">
          <div class="member-head">
            <div class="member-avatar">白</div>
            <div>
              <h2 class="member-name">白石 結衣</h2>
              <div class="member-tags">
                <span class="member-tag">動画チーム</span><span class="member-tag">編集担当</span>
              </div>
            </div>
          </div>
          <p class="member-bio">
            学習動画の台本と編集を担当。わかりやすい教材づくりに力を入れています。
          </p>
        </article>
      </div>
    </main>
  </body>
</html>
