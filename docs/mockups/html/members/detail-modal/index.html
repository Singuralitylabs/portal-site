<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会員詳細モーダルモック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main class="page" style="background: #f8fafc">
      <div
        class="container"
        data-mockup-capture="member-detail-modal-content"
        style="max-width: 1040px; padding-top: 26px"
      >
        <section class="member-modal-shell">
          <div class="detail-row">
            <h1 class="member-modal-title">メンバーのご紹介</h1>
            <span class="detail-close">×</span>
          </div>

          <div class="member-modal-top">
            <div class="member-avatar-lg">白</div>
            <div>
              <h2 class="profile-name" style="font-size: 30px; margin: 0">白石 結衣</h2>
              <div class="member-tags" style="margin-top: 8px">
                <span class="member-tag">動画チーム</span>
                <span class="member-tag">編集担当</span>
              </div>
            </div>
          </div>

          <section style="margin-top: 18px">
            <p style="margin: 0 0 8px; font-size: 16px; font-weight: 600">自己紹介</p>
            <p style="margin: 0; color: #4b5563; line-height: 1.8">
              学習動画の台本と編集を担当しています。初学者にとって理解しやすい構成を意識し、
              実践的な内容を届けることを心がけています。ワークショップでは司会進行も担当しています。
            </p>
          </section>

          <nav class="member-links">
            <a href="#">X URL</a>
            <a href="#">Facebook URL</a>
            <a href="#">Instagram URL</a>
            <a href="#">GitHub URL</a>
            <a href="#">ポートフォリオサイトのURL</a>
          </nav>
        </section>
      </div>
    </main>
  </body>
</html>
