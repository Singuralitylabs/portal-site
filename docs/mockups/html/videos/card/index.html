<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>動画カードモック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main
      class="page"
      style="background: #fff; display: flex; align-items: flex-start; justify-content: center"
    >
      <div data-mockup-capture="video-card-content" class="single-card">
        <article class="video-card" style="aspect-ratio: 1 / 1">
          <span style="position: absolute; right: 10px; top: 8px; z-index: 10; color: #6b7280"
            >⋮</span
          >
          <div class="thumb">
            <div class="play"><span>▶</span></div>
            <div class="duration">18:32</div>
          </div>
          <div class="video-body">
            <h3>TypeScript入門</h3>
            <p>TypeScriptの基本構文、型定義、React/Next.jsでの活用方法を学べる動画です。</p>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
