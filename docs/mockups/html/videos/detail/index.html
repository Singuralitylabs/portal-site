<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>動画詳細画面モック</title>
    <link rel="stylesheet" href="/assets/mockup.css" />
  </head>
  <body>
    <main class="page content-shell">
      <div
        class="container"
        data-mockup-capture="video-detail-content"
        style="max-width: 920px; padding: 5px"
      >
        <h1 class="section-title">TypeScript入門</h1>
        <section class="detail-card">
          <div class="thumb" style="aspect-ratio: 16/9">
            <div class="play" style="font-size: 40px"><span>▶</span></div>
            <div class="duration">18:32</div>
          </div>
          <div class="detail-meta" style="padding: 16px">
            <div class="detail-row">
              <span class="badge" style="color: #111827; background: #e5e7eb"
                >プログラミング学習</span
              ><span>責任者：学習チーム</span>
            </div>
            <div class="detail-row"><span>📅 2026-02-22</span><span>ビデオの長さ 18:32</span></div>
          </div>
        </section>
        <hr class="hr" style="margin: 20px 16px" />
        <section style="padding: 0 16px 16px">
          <p style="margin: 0; color: #374151; line-height: 1.75">
            TypeScriptの基本構文、型定義、React/Next.jsでの活用方法を学べる動画です。実装例を見ながら、日々の開発で安全に型を扱うためのポイントを確認できます。
          </p>
        </section>
      </div>
    </main>
  </body>
</html>
