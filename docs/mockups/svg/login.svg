<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="mockup-screen">
  <defs>
    <filter id="buttonShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#e5e7eb" />

  <text x="640" y="92" text-anchor="middle" font-size="54" font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-weight="700" fill="#000000">シンギュラリティ・ラボ ポータルサイト</text>
  <text x="640" y="156" text-anchor="middle" font-size="26" font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-weight="700" fill="#ef4444"><tspan x="640" dy="0">本サイトには、シンギュラリティ・ラボの会員のみアクセスできます。</tspan></text>

  <rect x="378" y="208" width="524" height="74" rx="10" fill="#ffffff" stroke="#9ca3af" stroke-width="2" filter="url(#buttonShadow)" />
  <circle cx="463" cy="245" r="23" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />
  <text x="463" y="255" text-anchor="middle" font-size="40" font-family="Arial, sans-serif" font-weight="700" fill="#2563eb">G</text>
  <text x="524" y="255" text-anchor="start" font-size="58" font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-weight="700" fill="#000000">Googleでログイン</text>

  <rect x="188" y="360" width="904" height="290" rx="16" fill="#dbe4f0" />
  <text x="220" y="422" text-anchor="start" font-size="51" font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-weight="700" fill="#1e3a8a">ログイン時のご連絡</text>
  <text x="220" y="478" text-anchor="start" font-size="20" font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-weight="400" fill="#1e3a8a"><tspan x="220" dy="0">Googleアカウント選択画面では、Supabaseの認証システムを利用している仕様上、下記のURLが表示されます。</tspan><tspan x="220" dy="30">本URLはシンラボのポータルサイトへのアクセスページなので、安心してログインしてください。</tspan></text>
  <text x="640" y="584" text-anchor="middle" font-size="40" font-family="'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" font-weight="400" fill="#1e3a8a">anawnwhhsgragkcorecl.supabase.co</text>
</svg>
